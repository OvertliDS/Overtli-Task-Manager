name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20.10.0', '24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm ls better-sqlite3 --depth=0
      - run: npm test
      - run: npm run syntax:check
      - run: npm pack --dry-run
      - run: git diff --check
